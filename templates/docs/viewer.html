<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    --accent: #1e3a5f;
    --accent-muted: #4a6985;
    --bg: #fafafa;
    --card: #ffffff;
    --text: #1c1c1c;
    --muted: #666;
    --border: #e2e2e2;
    --check-active: #2d6a4f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    background: var(--bg);
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  .doc-header {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 16px;
    margin-bottom: 32px;
  }

  .doc-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .doc-meta {
    font-size: 12px;
    color: var(--muted);
  }

  /* === TYPOGRAPHY === */
  h1, h2, h3, h4 { color: var(--accent); font-weight: 700; margin: 1.4em 0 0.5em; line-height: 1.3; }
  h1 { font-size: 20px; }
  h2 { font-size: 17px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  h3 { font-size: 15px; }
  h4 { font-size: 14px; color: var(--accent-muted); }

  p { margin-bottom: 0.75em; }

  a { color: var(--accent-muted); text-decoration: underline; }
  a:hover { color: var(--accent); }

  strong { font-weight: 600; }
  em { font-style: italic; color: #444; }

  code {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12.5px;
    background: #f0f4f8;
    border: 1px solid #dde3ea;
    border-radius: 3px;
    padding: 1px 5px;
  }

  pre {
    background: #f0f4f8;
    border: 1px solid #dde3ea;
    border-radius: 6px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 1em 0;
  }

  pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12.5px;
  }

  blockquote {
    border-left: 3px solid var(--accent-muted);
    margin: 1em 0;
    padding: 8px 16px;
    background: #f5f7fa;
    color: #444;
    border-radius: 0 4px 4px 0;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5em 0;
  }

  /* === LISTS === */
  ul, ol {
    padding-left: 22px;
    margin-bottom: 0.75em;
  }

  li { margin-bottom: 0.25em; }
  li > ul, li > ol { margin-top: 0.25em; margin-bottom: 0.25em; }

  /* === TABLES === */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin: 1em 0;
  }

  th {
    background: var(--accent);
    color: #fff;
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.03em;
  }

  td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: #f7f9fc; }

  /* === INTERACTIVE CHECKBOXES === */
  .task-list-item {
    list-style: none;
    margin-left: -18px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }

  .task-checkbox {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    min-width: 16px;
    border: 2px solid var(--accent-muted);
    border-radius: 3px;
    cursor: pointer;
    margin-top: 3px;
    background: #fff;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }

  .task-checkbox:checked {
    background: var(--check-active);
    border-color: var(--check-active);
  }

  .task-checkbox:checked::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 0px;
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  .task-checkbox:hover:not(:checked) { border-color: var(--accent); }

  .task-label {
    line-height: 1.5;
    cursor: pointer;
    user-select: none;
  }

  .task-label.checked {
    color: var(--muted);
    text-decoration: line-through;
  }

  /* === WARNING BLOCKS (cv-compare fabrication alerts) === */
  .warning-block {
    background-color: #fffbeb;
    border-left: 4px solid #d97706;
    padding: 12px 16px;
    margin: 16px 0;
    border-radius: 4px;
  }

  .warning-block strong {
    color: #92400e;
  }

  .warning-block p { margin-bottom: 0.4em; }

  /* === PRINT === */
  @media print {
    body { background: #fff; }
    .doc-meta { display: none; }
    .task-checkbox { border-color: #888; }
    .task-checkbox:checked::after { border-color: #333; }
    .warning-block { border-left-color: #b45309; background: #fef3c7; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="doc-header">
    <h1>{{TITLE}}</h1>
    <div class="doc-meta">Generated {{GENERATED_DATE}} · Source: <code>{{SOURCE_MD}}</code></div>
  </div>

  <div id="content">
    {{CONTENT}}
  </div>

</div>

<script>
  const STORAGE_KEY = 'cs-checks-{{SOURCE_MD}}';

  function saveState() {
    const state = {};
    document.querySelectorAll('.task-checkbox').forEach((cb, i) => {
      state[i] = cb.checked;
    });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) {}
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const state = JSON.parse(raw);
      document.querySelectorAll('.task-checkbox').forEach((cb, i) => {
        if (state[i]) {
          cb.checked = true;
          const label = cb.closest('.task-list-item')?.querySelector('.task-label');
          if (label) label.classList.add('checked');
        }
      });
    } catch (_) {}
  }

  function wireCheckboxes() {
    // Convert markdown-rendered checkboxes (input[type=checkbox]) to our styled ones
    document.querySelectorAll('input[type="checkbox"]').forEach((input, i) => {
      const li = input.closest('li');
      if (!li) return;

      li.classList.add('task-list-item');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'task-checkbox';
      cb.checked = input.checked;
      cb.id = 'task-' + i;

      const labelEl = document.createElement('label');
      labelEl.className = 'task-label' + (input.checked ? ' checked' : '');
      labelEl.htmlFor = 'task-' + i;
      labelEl.innerHTML = li.innerHTML.replace(/<input[^>]*>/i, '').trim();

      input.replaceWith(cb);
      li.innerHTML = '';
      li.appendChild(cb);
      li.appendChild(labelEl);

      cb.addEventListener('change', () => {
        labelEl.classList.toggle('checked', cb.checked);
        saveState();
      });
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    wireCheckboxes();
    loadState();
  });
</script>
</body>
</html>
