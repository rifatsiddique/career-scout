# career-scout portal scanner configuration
#
# See config/portals.example.yml for a fully populated example with 50+ companies.
# Run 'setup' for guided configuration, or copy the example file manually.
#
# New fields in Phase 3:
#   priority: true        — mark dream companies for 'scan --fast' daily checks
#   stale_threshold_days  — pending items older than this get stale-checked (default 21)
#   lookback_days         — ignore scan-history entries older than this for dedup (default 180)

stale_threshold_days: 21
lookback_days: 180

title_filter:
  positive: []                       # JD title must contain at least one of these
    # Examples:
    # - "Engineer"
    # - "Scientist"
    # - "Manager"
  negative: []                       # JD title must NOT contain any of these
    # Examples:
    # - "Intern"
    # - "Entry-Level"
    # - "Junior"
  seniority_boost: []                # Prioritize these in results
    # Examples:
    # - "Senior"
    # - "Staff"
    # - "Lead"
    # - "Principal"

location_filter:                     # (optional) leave empty to skip location filtering
  allow: []                          # Substring match, case-insensitive
    # Examples:
    # - "Remote"
    # - "United States"
  block: []
    # Examples:
    # - "India"

tracked_companies: []
  # Format:
  # - name: "Company Name"
  #   careers_url: "https://company.com/careers"
  #   api_provider: null             # greenhouse, ashby, lever, bamboohr, or null
  #   enabled: true

search_queries: []
  # Format:
  # - query: "Senior Engineer site:jobs.ashbyhq.com"
  #   enabled: true
