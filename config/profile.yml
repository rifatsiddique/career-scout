# career-scout candidate profile
# Fill in your details. Fields marked (optional) can be left blank.

candidate:
  # CONTACT FIELDS — used verbatim in generated CVs. Leave empty to omit (never fabricated).
  # Do NOT use template placeholders — fill with your real values or leave blank.
  full_name: ""
  email: ""
  phone: ""                          # (optional) leave blank to omit from CV
  work_authorization: ""             # (optional) e.g. "Authorized to work in EU" or "Requires H-1B"
  location: ""                       # e.g. "San Francisco, CA"
  linkedin: ""                       # e.g. "linkedin.com/in/yourname" — leave blank to omit
  google_scholar: ""                 # (optional) e.g. "scholar.google.com/citations?user=XXXXX" — leave blank to omit
  orcid: ""                          # (optional) ORCID identifier e.g. "0000-0001-2345-6789" — leave blank to omit (Template 3 only)
  portfolio_url: ""                  # (optional) full URL — leave blank to omit
  github: ""                         # (optional) e.g. "github.com/yourname" — leave blank to omit
  patent_url: ""                     # (optional) Google Patents / USPTO profile URL — leave blank to omit (Template 4B only)

target_roles:
  primary: []                        # e.g. ["Senior AI Engineer", "Staff ML Engineer"]
  archetypes: []                     # Defined in modes/_profile.md — populated during /setup

narrative:
  headline: ""                       # One-liner describing your professional identity
  exit_story: ""                     # Why you're looking, what makes you unique
  superpowers: []                    # 2-3 key differentiators
  proof_points: []                   # Format: [{name: "Project X", url: "...", hero_metric: "..."}]

compensation:
  target_range: ""                   # e.g. "$150K-200K"
  currency: "USD"
  minimum: ""                        # Walk-away number

location:
  country: ""
  city: ""
  timezone: ""
  visa_status: ""                    # e.g. "No sponsorship needed"
  onsite_availability: ""            # e.g. "Remote only" or "1 week/month"
  market: ""                         # Regional context for comp/labor law. Options: US-West, US-East, DACH, UK, Francophone, Japan, etc.

cv:
  default_template: "classic-professional"  # Options: classic-professional, ats-optimized, academic-research, technical-engineering
  template_overrides: {}                    # Map archetype → template, e.g. {academic: "academic-research"}
  target_pages: 2                           # Target CV length: 1 or 2. Set to 1 for early-career candidates. Hard stop overrides this if cv.md has < 10 total bullets.
  diff_threshold: 0.5                       # Jaccard similarity threshold for cv-compare.mjs bullet matching (0.0-1.0). 0.5 = bullets sharing ≥50% of tokens are treated as rewrites of each other.

auto:
  min_cv_score: 80                          # Minimum composite score (0-100) to generate a CV in auto mode.
                                            # 80 = GOOD_FIT+ — the proven "apply" bar (calibrated across 740+ evaluations).
                                            # Below this: auto skips CV and explains why. Run  cv {slug}  to override one-off.
                                            # Recommended range: 65 (include PARTIAL_MATCH) to 90 (PERFECT_MATCH only).

batch:
  sequential_checkpoint: 3                  # Max jobs to process per invocation in the sequential fallback (no-subagent CLIs).
                                            # After this many jobs, batch saves state and pauses — keeps context small and API cost predictable.
                                            # Re-run  batch  to continue (completed jobs are skipped automatically).
                                            # Ignored when subagents are available (Gemini CLI, Claude Code).
