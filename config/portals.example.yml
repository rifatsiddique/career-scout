# EXAMPLE — Copy to config/portals.yml and customize.
# Only config/portals.yml is used by the scanner. This file is a reference.
#
# HOW TO USE:
#   1. Copy this file: cp config/portals.example.yml config/portals.yml
#   2. Edit title_filter.positive with YOUR target role keywords [CUSTOMIZE]
#   3. Add/remove companies in tracked_companies
#   4. Mark dream companies with priority: true for 'scan --fast' daily checks
#   5. Set enabled: false on companies you don't care about
#
# SCANNER SUPPORT (Phase 3):
#   Greenhouse, Ashby, and Lever APIs are supported by the zero-token scanner.
#   Companies with these career URLs are detected automatically.
#   Other portals (Workday, BambooHR, custom) require Playwright scraping (Phase 3b).
#
# TIP: Keep title_filter BROAD — the Evaluator does fine-grained scoring,
#   not the Scanner. A broad filter catches both "AI Engineer" AND "Technical PM" roles.

# -- Global scanner config --

stale_threshold_days: 21    # Pending items older than this get stale-checked weekly
lookback_days: 180           # Ignore scan-history entries older than this for dedup
                             # (allows re-discovery of roles after a long break)

# -- Location filter (optional) --
# Filter scanned jobs by location. Applied AFTER title filter.
# If absent or empty, all locations pass.
#
# Semantics:
#   - Empty location string on a job → pass (don't penalize missing data)
#   - Any `block` keyword present → reject (takes precedence over allow)
#   - `allow` empty → pass
#   - `allow` non-empty → must match at least one keyword
# All matches are case-insensitive substring.

# location_filter:
#   allow:
#     - "Remote"
#     - "United States"
#     - "USA"
#   block:
#     - "India"
#     - "Singapore"

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match.

title_filter:
  positive:
    # [CUSTOMIZE] Replace with YOUR target role keywords
    # -- AI/ML roles --
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "MLOps"
    - "Voice AI"
    - "Conversational AI"
    # -- Engineering roles --
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "Customer Engineer"
    - "Integration Engineer"
    # -- Product roles --
    - "Product Manager"
    - "Technical PM"
    # -- Automation roles --
    - "Automation"
    - "Low-Code"
    - "No-Code"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Junior"
    - "Intern"
    - ".NET"
    - "iOS"
    - "Android"
    - "Embedded"
    - "Firmware"
    - "Blockchain"
    - "Web3"
    - "Crypto"
  seniority_boost:
    # These are not required but deprioritize junior results
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries (Phase 3b — not yet used by scanner) --
# These will power WebSearch broad discovery in Phase 3b.
# Configure them now so they're ready when Phase 3b ships.

search_queries:
  - name: "Ashby — AI Engineer"
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Forward Deployed" remote'
    enabled: true

  - name: "Greenhouse — AI PM"
    query: 'site:job-boards.greenhouse.io "AI Product Manager" OR "Senior Product Manager" AI remote'
    enabled: true

# -- Tracked companies --
